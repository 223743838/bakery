  <header>
    <h1>Sweet Bakery Games</h1>
    <p>Play small bakery games and track events using GA4.</p>
  </header>
 
  <main>
    <section class="card">
      <h2>Cupcake Clicker Game</h2>
      <p>Click the cupcake as many times as you can.</p>
 
      <button id="startGameBtn">Start Game</button>
 
      <div id="gameArea" style="display:none;">
        <button id="cupcakeBtn">🧁 Click Cupcake</button>
        <p>Score: <span id="score">0</span></p>
        <button id="endGameBtn">End Game</button>
      </div>
    </section>
 
    <section class="card">
      <h2>Contact Bakery</h2>
      <form id="contactForm">
        <input type="text" placeholder="Your name" required>
        <input type="email" placeholder="Your email" required>
        <button type="submit">Submit Enquiry</button>
      </form>
    </section>
  </main>
 
  <script src="game.js"></script>
